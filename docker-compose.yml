# =============================================================================
# Ubon Health Insights - Docker Compose Configuration
# =============================================================================
# Development and production-ready compose file
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MariaDB Database
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11.4
    container_name: ubon-health-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --init-connect=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-12345678}
      - MARIADB_DATABASE=${DB_NAME:-ubon_health}
    volumes:
      - ubon-db-data:/var/lib/mysql
    networks:
      - ubon-network
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ubon-health-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3010}:3010"
    environment:
      # Database connection
      - DATABASE_URL=${DATABASE_URL:-mysql://root:${DB_ROOT_PASSWORD:-12345678}@db:${DB_PORT:-3306}/${DB_NAME:-ubon_health}}

      # NextAuth.js configuration
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://coolify.phoubon.in.th}
      - PORT=${PORT:-3010}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}

      # Application environment
      - NODE_ENV=production
      - DEFAULT_FISCAL_YEARS=${DEFAULT_FISCAL_YEARS:-2569}
      - BOOTSTRAP_SEED=${BOOTSTRAP_SEED:-true}
      - BOOTSTRAP_ADMIN=${BOOTSTRAP_ADMIN:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ubonlocal.go.th}
      - ADMIN_NAME=${ADMIN_NAME:-ADMIN Ubon}

      # Optional: OAuth providers
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ubon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Optional: Adminer (Database Management UI)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: ubon-health-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ubon-network
    profiles:
      - admin

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  ubon-network:
    driver: bridge

volumes:
  ubon-db-data:
