# =============================================================================
# Ubon Health Insights - Docker Compose Configuration
# =============================================================================
# Development and production-ready compose file
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ubon-health-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database connection
      - DATABASE_URL=${DATABASE_URL:-mysql://root:${DB_ROOT_PASSWORD:-12345678}@host.docker.internal:${DB_PORT:-3306}/${DB_NAME:-ubon_health}}
      
      # NextAuth.js configuration
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      
      # Application environment
      - NODE_ENV=production
      
      # Optional: OAuth providers
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-}
    networks:
      - ubon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Optional: Adminer (Database Management UI)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: ubon-health-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - ubon-network
    profiles:
      - admin

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  ubon-network:
    driver: bridge
