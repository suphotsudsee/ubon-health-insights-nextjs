<script>
    // Immediate theme application - runs before any rendering
    (function () {
        const t = localStorage.theme || 'dark';
        const d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList[d ? 'add' : 'remove']('dark');
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
    })();
</script>

}" x-init="window.toast = function(message, options = {}) {
    try {
        let description = '';
        let type = 'default';
        let position = 'top-center';
        let html = '';
        if (typeof options.description != 'undefined') description = options.description;
        if (typeof options.type != 'undefined') type = options.type;
        if (typeof options.position != 'undefined') position = options.position;
        if (typeof options.html != 'undefined') html = options.html;

        window.dispatchEvent(new CustomEvent('toast-show', { detail: { type: type, message: message, description: description, position: position, html: html } }));
    } catch (error) {
        console.error('Error showing toast:', error);
    }
}" class="relative space-y-5">
    <template x-teleport="body">
        <ul x-data="{
            toasts: [],
            toastsHovered: false,
            timeout: null,

            layout: 'default',
            position: '',
            paddingBetweenToasts: 15,
            deleteToastWithId(id) {
                for (let i = 0; i < this.toasts.length; i++) {
                    if (this.toasts[i].id === id) {
                        this.toasts.splice(i, 1);
                        break;
                    }
                }
            },
            burnToast(id) {
                burnToast = this.getToastWithId(id);
                burnToastElement = document.getElementById(burnToast.id);
                if (burnToastElement) {
                    if (this.toasts.length == 1) {
                        if (this.layout == 'default') {
                            this.expanded = false;
                        }
                        burnToastElement.classList.remove('translate-y-0');
                        if (this.position.includes('bottom')) {
                            burnToastElement.classList.add('translate-y-full');
                        } else {
                            burnToastElement.classList.add('-translate-y-full');
                        }
                        burnToastElement.classList.add('-translate-y-full');
                    }
                    burnToastElement.classList.add('opacity-0');
                    let that = this;
                    setTimeout(function() {
                        that.deleteToastWithId(id);
                        setTimeout(function() {
                            that.stackToasts();
                        }, 1)
                    }, 300);
                }
            },
            getToastWithId(id) {
                for (let i = 0; i < this.toasts.length; i++) {
                    if (this.toasts[i].id === id) {
                        return this.toasts[i];
                    }
                }
            },
            stackToasts() {
                this.positionToasts();
                this.calculateHeightOfToastsContainer();
                let that = this;
                setTimeout(function() {
                    that.calculateHeightOfToastsContainer();
                }, 300);
            },
            positionToasts() {
                if (this.toasts.length == 0) return;
                let topToast = document.getElementById(this.toasts[0].id);
                topToast.style.zIndex = 100;
                if (this.expanded) {
                    if (this.position.includes('bottom')) {
                        topToast.style.top = 'auto';
                        topToast.style.bottom = '0px';
                    } else {
                        topToast.style.top = '0px';
                    }
                }
        
                let bottomPositionOfFirstToast = this.getBottomPositionOfElement(topToast);
        
                if (this.toasts.length == 1) return;
                let middleToast = document.getElementById(this.toasts[1].id);
                middleToast.style.zIndex = 90;
        
                if (this.expanded) {
                    middleToastPosition = topToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts + 'px';
        
                    if (this.position.includes('bottom')) {
                        middleToast.style.top = 'auto';
                        middleToast.style.bottom = middleToastPosition;
                    } else {
                        middleToast.style.top = middleToastPosition;
                    }
        
                    middleToast.style.scale = '100%';
                    middleToast.style.transform = 'translateY(0px)';
        
                } else {
                    middleToast.style.scale = '94%';
                    if (this.position.includes('bottom')) {
                        middleToast.style.transform = 'translateY(-16px)';
                    } else {
                        this.alignBottom(topToast, middleToast);
                        middleToast.style.transform = 'translateY(16px)';
                    }
                }
        
        
                if (this.toasts.length == 2) return;
                let bottomToast = document.getElementById(this.toasts[2].id);
                bottomToast.style.zIndex = 80;
                if (this.expanded) {
                    bottomToastPosition = topToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts +
                        middleToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts + 'px';
        
                    if (this.position.includes('bottom')) {
                        bottomToast.style.top = 'auto';
                        bottomToast.style.bottom = bottomToastPosition;
                    } else {
                        bottomToast.style.top = bottomToastPosition;
                    }
        
                    bottomToast.style.scale = '100%';
                    bottomToast.style.transform = 'translateY(0px)';
                } else {
                    bottomToast.style.scale = '88%';
                    if (this.position.includes('bottom')) {
                        bottomToast.style.transform = 'translateY(-32px)';
                    } else {
                        this.alignBottom(topToast, bottomToast);
                        bottomToast.style.transform = 'translateY(32px)';
                    }
                }
        
        
        
                if (this.toasts.length == 3) return;
                let burnToast = document.getElementById(this.toasts[3].id);
                burnToast.style.zIndex = 70;
                if (this.expanded) {
                    burnToastPosition = topToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts +
                        middleToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts +
                        bottomToast.getBoundingClientRect().height +
                        this.paddingBetweenToasts + 'px';
        
                    if (this.position.includes('bottom')) {
                        burnToast.style.top = 'auto';
                        burnToast.style.bottom = burnToastPosition;
                    } else {
                        burnToast.style.top = burnToastPosition;
                    }
        
                    burnToast.style.scale = '100%';
                    burnToast.style.transform = 'translateY(0px)';
                } else {
                    burnToast.style.scale = '82%';
                    this.alignBottom(topToast, burnToast);
                    burnToast.style.transform = 'translateY(48px)';
                }
        
                burnToast.firstElementChild.classList.remove('opacity-100');
                burnToast.firstElementChild.classList.add('opacity-0');
        
                let that = this;
                // Burn ?? (remove) last toast
                setTimeout(function() {
                    that.toasts.pop();
                }, 300);
        
                if (this.position.includes('bottom')) {
                    middleToast.style.top = 'auto';
                }
        
                return;
            },
            alignBottom(element1, element2) {
                // Get the top position and height of the first element
                let top1 = element1.offsetTop;
                let height1 = element1.offsetHeight;
        
                // Get the height of the second element
                let height2 = element2.offsetHeight;
        
                // Calculate the top position for the second element
                let top2 = top1 + (height1 - height2);
        
                // Apply the calculated top position to the second element
                element2.style.top = top2 + 'px';
            },
            alignTop(element1, element2) {
                // Get the top position of the first element
                let top1 = element1.offsetTop;
        
                // Apply the same top position to the second element
                element2.style.top = top1 + 'px';
            },
            resetBottom() {
                for (let i = 0; i < this.toasts.length; i++) {
                    if (document.getElementById(this.toasts[i].id)) {
                        let toastElement = document.getElementById(this.toasts[i].id);
                        toastElement.style.bottom = '0px';
                    }
                }
            },
            resetTop() {
                for (let i = 0; i < this.toasts.length; i++) {
                    if (document.getElementById(this.toasts[i].id)) {
                        let toastElement = document.getElementById(this.toasts[i].id);
                        toastElement.style.top = '0px';
                    }
                }
            },
            getBottomPositionOfElement(el) {
                return (el.getBoundingClientRect().height + el.getBoundingClientRect().top);
            },
            calculateHeightOfToastsContainer() {
                if (this.toasts.length == 0) {
                    $el.style.height = '0px';
                    return;
                }
        
                lastToast = this.toasts[this.toasts.length - 1];
                lastToastRectangle = document.getElementById(lastToast.id).getBoundingClientRect();
        
                firstToast = this.toasts[0];
                firstToastRectangle = document.getElementById(firstToast.id).getBoundingClientRect();
        
                if (this.toastsHovered) {
                    if (this.position.includes('bottom')) {
                        $el.style.height = ((firstToastRectangle.top + firstToastRectangle.height) - lastToastRectangle.top) + 'px';
                    } else {
                        $el.style.height = ((lastToastRectangle.top + lastToastRectangle.height) - firstToastRectangle.top) + 'px';
                    }
                } else {
                    $el.style.height = firstToastRectangle.height + 'px';
                }
            }
        }"

    <script data-navigate-once>
        // Global HTML sanitization function using DOMPurify
        window.sanitizeHTML = function (html) {
            if (!html) return '';
            const URL_RE = /^(https?:|mailto:)/i;
            const config = {
                ALLOWED_TAGS: ['a', 'b', 'br', 'code', 'del', 'div', 'em', 'i', 'mark', 'p', 'pre', 's', 'span', 'strong',
                    'u'
                ],
                ALLOWED_ATTR: ['class', 'href', 'target', 'title', 'rel'],
                ALLOW_DATA_ATTR: false,
                FORBID_TAGS: ['script', 'object', 'embed', 'applet', 'iframe', 'form', 'input', 'button', 'select',
                    'textarea', 'details', 'summary', 'dialog', 'style'
                ],
                FORBID_ATTR: ['onerror', 'onload', 'onclick', 'onmouseover', 'onfocus', 'onblur', 'onchange',
                    'onsubmit', 'ontoggle', 'style'
                ],
                KEEP_CONTENT: true,
                RETURN_DOM: false,
                RETURN_DOM_FRAGMENT: false,
                SANITIZE_DOM: true,
                SANITIZE_NAMED_PROPS: true,
                SAFE_FOR_TEMPLATES: true,
                ALLOWED_URI_REGEXP: URL_RE
            };

            // One-time hook registration (idempotent pattern)
            if (!window.__dpLinkHook) {
                DOMPurify.addHook('afterSanitizeAttributes', node => {
                    // Remove Alpine.js directives to prevent XSS
                    if (node.hasAttributes && node.hasAttributes()) {
                        const attrs = Array.from(node.attributes);
                        attrs.forEach(attr => {
                            // Remove x-* attributes (Alpine directives)
                            if (attr.name.startsWith('x-')) {
                                node.removeAttribute(attr.name);
                            }
                            // Remove @* attributes (Alpine event shorthand)
                            if (attr.name.startsWith('@')) {
                                node.removeAttribute(attr.name);
                            }
                            // Remove :* attributes (Alpine binding shorthand)
                            if (attr.name.startsWith(':')) {
                                node.removeAttribute(attr.name);
                            }
                        });
                    }

                    // Existing link sanitization
                    if (node.nodeName === 'A' && node.hasAttribute('href')) {
                        const href = node.getAttribute('href') || '';
                        if (!URL_RE.test(href)) node.removeAttribute('href');
                        if (node.getAttribute('target') === '_blank') {
                            node.setAttribute('rel', 'noopener noreferrer');
                        }
                    }
                });
                window.__dpLinkHook = true;
            }
            return DOMPurify.sanitize(html, config);
        };

        // Initialize theme if not set
        if (!('theme' in localStorage)) {
            localStorage.theme = 'dark';
        }

        let theme = localStorage.theme
        let cpuColor = '#1e90ff'
        let ramColor = '#00ced1'
        let textColor = '#ffffff'
        let editorBackground = '#181818'
        let editorTheme = 'blackboard'

        function checkTheme() {
            theme = localStorage.theme
            if (theme == 'system') {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
            }
            if (theme == 'dark') {
                cpuColor = '#1e90ff'
                ramColor = '#00ced1'
                textColor = '#ffffff'
                editorBackground = '#181818'
                editorTheme = 'blackboard'
            } else {
                cpuColor = '#1e90ff'
                ramColor = '#00ced1'
                textColor = '#000000'
                editorBackground = '#ffffff'
                editorTheme = null
            }
        }
                let checkHealthInterval = null;
        let checkIfIamDeadInterval = null;

        function changePasswordFieldType(event) {
            let element = event.target
            for (let i = 0; i < 10; i++) {
                if (element.className === "relative") {
                    break;
                }
                element = element.parentElement;
            }
            element = element.children[1];
            if (element.nodeName === 'INPUT' || element.nodeName === 'TEXTAREA') {
                if (element.type === 'password') {
                    element.type = 'text';
                    if (element.disabled) return;
                    element.classList.add('truncate');
                    this.type = 'text';
                } else {
                    element.type = 'password';
                    if (element.disabled) return;
                    element.classList.remove('truncate');
                    this.type = 'password';
                }
            }
        }

        function copyToClipboard(text) {
            navigator?.clipboard?.writeText(text) && window.Livewire.dispatch('success', 'Copied to clipboard.');
        }
        document.addEventListener('livewire:init', () => {
            window.Livewire.on('reloadWindow', (timeout) => {
                if (timeout) {
                    setTimeout(() => {
                        window.location.reload();
                    }, timeout);
                    return;
                } else {
                    window.location.reload();
                }
            })
            window.Livewire.on('info', (message) => {
                if (typeof message === 'string') {
                    window.toast('Info', {
                        type: 'info',
                        description: message,
                    })
                    return;
                }
                if (message.length == 1) {
                    window.toast('Info', {
                        type: 'info',
                        description: message[0],
                    })
                } else if (message.length == 2) {
                    window.toast(message[0], {
                        type: 'info',
                        description: message[1],
                    })
                }
            })
            window.Livewire.on('error', (message) => {
                if (typeof message === 'string') {
                    window.toast('Error', {
                        type: 'danger',
                        description: message,
                    })
                    return;
                }
                if (message.length == 1) {
                    window.toast('Error', {
                        type: 'danger',
                        description: message[0],
                    })
                } else if (message.length == 2) {
                    window.toast(message[0], {
                        type: 'danger',
                        description: message[1],
                    })
                }
            })
            window.Livewire.on('warning', (message) => {
                if (typeof message === 'string') {
                    window.toast('Warning', {
                        type: 'warning',
                        description: message,
                    })
                    return;
                }
                if (message.length == 1) {
                    window.toast('Warning', {
                        type: 'warning',
                        description: message[0],
                    })
                } else if (message.length == 2) {
                    window.toast(message[0], {
                        type: 'warning',
                        description: message[1],
                    })
                }
            })
            window.Livewire.on('success', (message) => {
                if (typeof message === 'string') {
                    window.toast('Success', {
                        type: 'success',
                        description: message,
                    })
                    return;
                }
                if (message.length == 1) {
                    window.toast('Success', {
                        type: 'success',
                        description: message[0],
                    })
                } else if (message.length == 2) {
                    window.toast(message[0], {
                        type: 'success',
                        description: message[1],
                    })
                }
            })
        });
